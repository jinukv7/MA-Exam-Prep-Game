<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI NEXUS — MAMC5213 Exam Prep</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060f;--surface:#0d0d20;--card:#121228;--card2:#181838;
  --border:#252550;--border2:#353580;
  --g:#00ff88;--p:#9b59ff;--b:#00d4ff;--a:#ffaa00;--r:#ff4466;--o:#ff6b35;
  --text:#e0e0ff;--dim:#8888aa;--dim2:#5555aa;
  --shadow-g:0 0 20px rgba(0,255,136,.25);
  --shadow-p:0 0 20px rgba(155,89,255,.25);
  --shadow-b:0 0 20px rgba(0,212,255,.25);
  --shadow-a:0 0 20px rgba(255,170,0,.25);
  --shadow-r:0 0 20px rgba(255,68,102,.25);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;position:relative}
canvas#bgc{position:fixed;inset:0;z-index:0;opacity:.4;pointer-events:none}
#app{position:relative;z-index:1;min-height:100vh}

/* ── TYPOGRAPHY ── */
.title-glow{font-size:clamp(2rem,6vw,3.5rem);font-weight:900;letter-spacing:.08em;text-transform:uppercase;
  background:linear-gradient(135deg,var(--g),var(--b),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 30px rgba(0,255,136,.5));animation:pulse-title 3s ease-in-out infinite}
@keyframes pulse-title{0%,100%{filter:drop-shadow(0 0 20px rgba(0,255,136,.4))}50%{filter:drop-shadow(0 0 40px rgba(0,212,255,.7))}}
.subtitle{color:var(--dim);font-size:.85rem;letter-spacing:.2em;text-transform:uppercase;margin-top:.3rem}
h2{font-size:1.4rem;font-weight:700;color:var(--text)}
h3{font-size:1.1rem;font-weight:600;color:var(--text)}

/* ── LAYOUT ── */
.container{max-width:900px;margin:0 auto;padding:1rem 1rem 4rem}
.flex{display:flex;align-items:center;gap:1rem}
.flex-col{display:flex;flex-direction:column;gap:1rem}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.center{text-align:center}
.mt-1{margin-top:.5rem}.mt-2{margin-top:1rem}.mt-3{margin-top:1.5rem}
.mb-1{margin-bottom:.5rem}.mb-2{margin-bottom:1rem}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem;transition:all .2s}
.card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.5)}
.card-glow-g{box-shadow:var(--shadow-g);border-color:rgba(0,255,136,.3)}
.card-glow-p{box-shadow:var(--shadow-p);border-color:rgba(155,89,255,.3)}
.card-glow-b{box-shadow:var(--shadow-b);border-color:rgba(0,212,255,.3)}
.card-glow-a{box-shadow:var(--shadow-a);border-color:rgba(255,170,0,.3)}

/* ── BUTTONS ── */
.btn{border:none;border-radius:12px;padding:.75rem 1.5rem;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.05em;text-transform:uppercase;display:inline-flex;align-items:center;gap:.5rem;justify-content:center}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,var(--g),#00cc6a);color:#000;box-shadow:0 4px 20px rgba(0,255,136,.4)}
.btn-primary:hover{box-shadow:0 6px 30px rgba(0,255,136,.7);transform:translateY(-2px)}
.btn-secondary{background:var(--card2);border:1px solid var(--border2);color:var(--text)}
.btn-secondary:hover{background:var(--card);border-color:var(--p);color:var(--p)}
.btn-danger{background:linear-gradient(135deg,var(--r),#cc2244);color:#fff}
.btn-sm{padding:.5rem 1rem;font-size:.8rem;border-radius:8px}
.btn-full{width:100%}
.btn-icon{width:44px;height:44px;padding:0;border-radius:10px;font-size:1.1rem}

/* ── XP BAR ── */
.xp-bar-wrap{background:var(--border);border-radius:99px;height:8px;overflow:hidden;position:relative}
.xp-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--g),var(--b));transition:width .6s ease;position:relative}
.xp-bar-fill::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 2s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* ── STAT BADGE ── */
.stat{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:.5rem .9rem;font-size:.85rem;display:flex;align-items:center;gap:.4rem}
.stat-val{font-weight:800;font-size:1.1rem}
.stat-g .stat-val{color:var(--g)}
.stat-p .stat-val{color:var(--p)}
.stat-a .stat-val{color:var(--a)}
.stat-b .stat-val{color:var(--b)}
.stat-r .stat-val{color:var(--r)}

/* ── MODULE CARDS ── */
.module-card{cursor:pointer;position:relative;overflow:hidden;border-radius:16px;padding:1.25rem;border:1px solid var(--border);background:var(--card);transition:all .25s}
.module-card:hover{transform:translateY(-4px);border-color:var(--border2)}
.module-card .icon{font-size:2.2rem;margin-bottom:.5rem;display:block}
.module-card .mod-name{font-weight:700;font-size:1rem;margin-bottom:.3rem}
.module-card .mod-meta{font-size:.78rem;color:var(--dim)}
.module-card .progress-ring{position:absolute;top:.75rem;right:.75rem}
.module-card .completed-badge{position:absolute;top:.5rem;right:.5rem;background:var(--g);color:#000;font-size:.65rem;font-weight:800;padding:.2rem .4rem;border-radius:6px}

/* ── MODE CARDS ── */
.mode-card{cursor:pointer;border-radius:14px;padding:1.1rem;border:1px solid var(--border);background:var(--card);transition:all .2s;display:flex;gap:.9rem;align-items:flex-start}
.mode-card:hover{transform:translateY(-3px)}
.mode-card .mode-icon{font-size:2rem;flex-shrink:0;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:var(--card2)}
.mode-card .mode-name{font-weight:700;margin-bottom:.2rem}
.mode-card .mode-desc{font-size:.8rem;color:var(--dim);line-height:1.4}
.mode-card .stars{margin-top:.4rem;font-size:.9rem}

/* ── QUIZ GAME ── */
.game-header{padding:1rem;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.timer-bar-wrap{height:6px;background:var(--border);border-radius:99px;overflow:hidden}
.timer-bar{height:100%;border-radius:99px;transition:width .1s linear,background .3s;background:var(--g)}
.timer-bar.warn{background:var(--a)}
.timer-bar.danger{background:var(--r)}

.question-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin:1rem 0}
.question-text{font-size:1.1rem;font-weight:600;line-height:1.5;color:var(--text)}
.question-num{font-size:.8rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.6rem}

.options{display:flex;flex-direction:column;gap:.7rem;margin-top:1.2rem}
.option-btn{background:var(--card2);border:2px solid var(--border);border-radius:12px;padding:.9rem 1.1rem;text-align:left;cursor:pointer;color:var(--text);font-size:.95rem;transition:all .2s;position:relative;overflow:hidden}
.option-btn:hover{border-color:var(--p);background:rgba(155,89,255,.1)}
.option-btn.correct{border-color:var(--g)!important;background:rgba(0,255,136,.15)!important;color:var(--g)!important;animation:correct-pulse .4s}
.option-btn.wrong{border-color:var(--r)!important;background:rgba(255,68,102,.15)!important;color:var(--r)!important;animation:shake .4s}
.option-btn.reveal{border-color:var(--g);background:rgba(0,255,136,.08);color:var(--g);opacity:.7}
.option-btn:disabled{cursor:not-allowed}
.option-label{display:inline-flex;width:28px;height:28px;background:var(--border);border-radius:6px;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;margin-right:.6rem;flex-shrink:0;vertical-align:middle}

@keyframes correct-pulse{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

/* ── FEEDBACK OVERLAY ── */
.feedback{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;pointer-events:none}
.feedback-bubble{border-radius:20px;padding:1rem 2rem;font-size:1.4rem;font-weight:900;animation:bubble-in .3s ease,bubble-out .3s ease .9s forwards;text-align:center}
.feedback-bubble.correct{background:rgba(0,255,136,.2);border:2px solid var(--g);color:var(--g)}
.feedback-bubble.wrong{background:rgba(255,68,102,.2);border:2px solid var(--r);color:var(--r)}
@keyframes bubble-in{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes bubble-out{from{opacity:1}to{opacity:0;transform:scale(1.1)}}

/* ── STREAK ── */
.streak-display{display:flex;align-items:center;gap:.4rem;font-weight:800;font-size:1.1rem}
.streak-fire{animation:fire 0.5s ease-in-out infinite alternate}
@keyframes fire{from{transform:scale(1) rotate(-5deg)}to{transform:scale(1.2) rotate(5deg)}}

/* ── MATCH MASTER ── */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.match-item{background:var(--card2);border:2px solid var(--border);border-radius:12px;padding:.75rem .9rem;cursor:pointer;transition:all .2s;font-size:.88rem;line-height:1.3;min-height:56px;display:flex;align-items:center}
.match-item:hover{border-color:var(--p)}
.match-item.selected{border-color:var(--b);background:rgba(0,212,255,.12);box-shadow:var(--shadow-b)}
.match-item.matched-correct{border-color:var(--g);background:rgba(0,255,136,.12);color:var(--g);cursor:default;pointer-events:none}
.match-item.matched-wrong{border-color:var(--r);background:rgba(255,68,102,.1);animation:shake .4s}
.match-col-label{font-size:.75rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.4rem;padding-left:.2rem}

/* ── T/F BUTTONS ── */
.tf-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1.5rem}
.tf-btn{border:3px solid var(--border);background:var(--card2);border-radius:16px;padding:1.2rem;font-size:1.5rem;font-weight:900;cursor:pointer;color:var(--text);transition:all .2s;letter-spacing:.05em}
.tf-btn.true-btn:hover{border-color:var(--g);background:rgba(0,255,136,.1);color:var(--g)}
.tf-btn.false-btn:hover{border-color:var(--r);background:rgba(255,68,102,.1);color:var(--r)}
.tf-btn.correct{border-color:var(--g)!important;background:rgba(0,255,136,.15)!important;color:var(--g)!important;animation:correct-pulse .4s}
.tf-btn.wrong{border-color:var(--r)!important;background:rgba(255,68,102,.15)!important;color:var(--r)!important;animation:shake .4s}

/* ── HEARTS (LIVES) ── */
.hearts{display:flex;gap:.3rem;font-size:1.4rem}
.heart{transition:all .3s}
.heart.lost{opacity:.2;filter:grayscale(1);transform:scale(.8)}

/* ── RESULTS ── */
.result-score{font-size:4rem;font-weight:900;background:linear-gradient(135deg,var(--g),var(--b));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;animation:score-in .5s ease}
@keyframes score-in{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.result-grade{font-size:1.5rem;font-weight:800;text-align:center;margin-top:.2rem}
.result-bar{height:14px;background:var(--border);border-radius:99px;overflow:hidden;margin:.4rem 0}
.result-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--g),var(--b));transition:width 1s ease .3s}
.xp-gain{font-size:1.8rem;font-weight:900;color:var(--a);text-align:center;animation:xp-bounce .6s ease .4s both}
@keyframes xp-bounce{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── ACHIEVEMENTS ── */
.achievement{background:linear-gradient(135deg,rgba(255,170,0,.15),rgba(255,170,0,.05));border:1px solid rgba(255,170,0,.3);border-radius:12px;padding:.7rem 1rem;display:flex;align-items:center;gap:.7rem;animation:ach-in .4s ease}
@keyframes ach-in{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
.achievement .ach-icon{font-size:1.5rem}
.achievement .ach-title{font-weight:700;font-size:.9rem;color:var(--a)}
.achievement .ach-desc{font-size:.75rem;color:var(--dim)}

/* ── LEVEL UP ── */
.levelup-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);animation:levelup-bg .3s ease}
@keyframes levelup-bg{from{opacity:0}to{opacity:1}}
.levelup-box{background:var(--card);border:2px solid var(--a);border-radius:24px;padding:2.5rem 3rem;text-align:center;animation:levelup-in .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes levelup-in{from{transform:scale(.3) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}

/* ── CONFETTI ── */
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;animation:confetti-fall linear forwards;z-index:300}
@keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ── PROGRESS RING ── */
.ring{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border)}
.ring-fill{fill:none;stroke:var(--g);stroke-linecap:round;transition:stroke-dashoffset 1s ease}

/* ── HOME SCREEN ── */
.hero{padding:3rem 1rem 2rem;text-align:center}
.player-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1rem 1.25rem;max-width:340px;margin:1.5rem auto}
.player-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--b));display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:900;color:#fff;flex-shrink:0}
.level-badge{background:linear-gradient(135deg,var(--a),#ff8c00);color:#000;font-weight:900;font-size:.75rem;padding:.2rem .5rem;border-radius:6px}

/* ── NAV ── */
.top-nav{display:flex;align-items:center;gap:.75rem;padding:1rem;border-bottom:1px solid var(--border);background:rgba(6,6,15,.9);backdrop-filter:blur(10px);position:sticky;top:0;z-index:20}
.back-btn{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:.45rem .9rem;color:var(--text);cursor:pointer;font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:.4rem;transition:all .2s}
.back-btn:hover{border-color:var(--p);color:var(--p)}

/* ── SCROLL ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── BOSS BATTLE ── */
.boss-hp-wrap{background:var(--border);border-radius:99px;height:16px;overflow:hidden;position:relative}
.boss-hp{height:100%;background:linear-gradient(90deg,var(--r),var(--o));border-radius:99px;transition:width .4s}
.boss-icon{font-size:4rem;text-align:center;animation:boss-float 2s ease-in-out infinite}
@keyframes boss-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* ── STUDY MODE ── */
.flashcard{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;transition:all .3s;perspective:1000px}
.flashcard:hover{border-color:var(--p)}
.flashcard.flipped{background:linear-gradient(135deg,rgba(0,255,136,.08),rgba(0,212,255,.08));border-color:rgba(0,255,136,.3)}
.fc-front{font-size:1.05rem;font-weight:600;line-height:1.5}
.fc-hint{font-size:.78rem;color:var(--dim);margin-top:1rem}

/* ── LEADERBOARD ── */
.lb-row{display:flex;align-items:center;gap:.75rem;padding:.7rem 1rem;border-radius:10px;background:var(--card2);border:1px solid var(--border)}
.lb-rank{font-weight:900;font-size:1.1rem;width:28px;text-align:center}
.lb-rank.gold{color:#ffd700}.lb-rank.silver{color:#c0c0c0}.lb-rank.bronze{color:#cd7f32}
.lb-name{flex:1;font-weight:600}
.lb-score{font-weight:800;color:var(--g)}

/* ── ANIMATIONS ── */
.fade-in{animation:fade-in .3s ease}
@keyframes fade-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.slide-in{animation:slide-in .3s ease}
@keyframes slide-in{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .grid-3{grid-template-columns:repeat(2,1fr)}
  .match-grid{gap:.4rem}
  .match-item{font-size:.8rem;padding:.6rem .7rem;min-height:50px}
  .tf-btn{padding:1rem;font-size:1.2rem}
  .title-glow{font-size:2rem}
}
</style>
</head>
<body>
<canvas id="bgc"></canvas>
<div id="app"></div>

<script>
/* ═══════════════════════════════════════════════
   QUESTION DATABASE
═══════════════════════════════════════════════ */
const DB = {
  gans: {
    id:'gans', icon:'🧬', name:'GANs & Generative AI', color:'--g',
    mcq:[
      {q:"Who invented Generative Adversarial Networks (GANs)?",opts:["Geoffrey Hinton","Ian Goodfellow","Yann LeCun","Andrew Ng"],ans:1},
      {q:"In what year were GANs invented?",opts:["2012","2016","2014","2018"],ans:2},
      {q:"How many neural networks does a GAN consist of?",opts:["One","Three","Four","Two"],ans:3},
      {q:"What does the Generator start with when creating synthetic data?",opts:["Real images","Text prompts","Random noise","Labeled datasets"],ans:2},
      {q:"What is the Discriminator's primary role in a GAN?",opts:["Generate images","Add noise to data","Classify real vs. fake","Train the generator"],ans:2},
      {q:"What type of game theory concept describes GAN training?",opts:["Cooperative game","Nash equilibrium","Zero-sum game","Prisoner's dilemma"],ans:2},
      {q:"What does the Discriminator output when evaluating an image?",opts:["A new image","A text label","Random noise","A probability score"],ans:3},
      {q:"When does GAN training reach equilibrium?",opts:["After 1000 iterations","When loss reaches zero","When generator stops improving","When discriminator can't tell real from fake"],ans:3},
      {q:"GANs are described as a class of what type of systems?",opts:["Database systems","Blockchain networks","Machine learning systems","Quantum algorithms"],ans:2},
      {q:"What do initial Generator outputs look like during early training?",opts:["Perfect replicas","High-resolution art","Solid black images","Poor quality, easily identifiable as fake"],ans:3},
    ],
    tf:[
      {q:"GANs consist of three competing neural networks.",ans:false,exp:"GANs have TWO neural networks: a Generator and a Discriminator."},
      {q:"The Generator transforms random noise into synthetic data.",ans:true,exp:"Correct! The Generator takes random noise as input and produces synthetic data."},
      {q:"Ian Goodfellow invented GANs in 2016.",ans:false,exp:"GANs were invented by Ian Goodfellow and colleagues in 2014."},
      {q:"The Discriminator outputs a thumbs-up for fake images.",ans:false,exp:"A thumbs-up represents REAL images; thumbs-down indicates fake."},
      {q:"GAN training improves both networks simultaneously through competition.",ans:true,exp:"Correct! Both the Generator and Discriminator improve through their adversarial competition."},
      {q:"As training progresses, the Generator eventually fools the Discriminator completely.",ans:true,exp:"Correct! In ideal GAN training, the Generator becomes so skilled that the Discriminator can no longer distinguish real from fake."},
    ],
    matches:[
      {term:"Generator",def:"Creates synthetic data from random noise"},
      {term:"Discriminator",def:"Classifies input as real or fake"},
      {term:"Zero-sum game",def:"One network's gain is the other's loss"},
      {term:"Random Noise",def:"The starting seed input for the Generator"},
      {term:"Probability Score",def:"What the Discriminator outputs for each image"},
      {term:"Equilibrium",def:"State where Discriminator can't tell real from fake"},
    ]
  },
  diffusion: {
    id:'diffusion', icon:'🌫️', name:'Diffusion Models', color:'--b',
    mcq:[
      {q:"Which famous AI image tool uses Diffusion model technology?",opts:["GPT-4","GitHub Copilot","DALL-E 3","AlphaGo"],ans:2},
      {q:"What type of noise is added during the forward process of a Diffusion model?",opts:["White noise","Digital noise","Quantum noise","Gaussian noise"],ans:3},
      {q:"What happens during the FORWARD process of a Diffusion model?",opts:["Images are created from text","Videos are compressed","Noise is added to images step by step","Text is generated"],ans:2},
      {q:"What does the AI learn to do during the REVERSE process?",opts:["Add more noise","Classify images","Compress data","Predict and subtract noise"],ans:3},
      {q:"Compared to GANs, Diffusion model training is described as:",opts:["Harder to stabilise","Requiring less data","Faster in all cases","More stable and predictable"],ans:3},
      {q:"In terms of generation SPEED, how do GANs compare to Diffusion models?",opts:["GANs are much slower","They have similar speeds","Diffusion models are faster","GANs are extremely fast — one step"],ans:3},
      {q:"In terms of image QUALITY, Diffusion models generally produce:",opts:["Lower quality images","Equal quality to GANs","Black and white only","Higher detail images"],ans:3},
      {q:"GANs are compared metaphorically to what?",opts:["A careful sculptor","A slow river","A high-speed competition","A gardener"],ans:2},
      {q:"Diffusion models are compared metaphorically to what?",opts:["A factory assembly line","A race car","A rapid print press","An artist carefully refining a sculpture"],ans:3},
      {q:"In terms of OUTPUT DIVERSITY, GANs tend to:",opts:["Create uniquely diverse images","Generate completely random results","Often repeat similar patterns","Never produce duplicates"],ans:2},
    ],

/* ═══════════════════════════════════════════════
   PARTICLE BACKGROUND
═══════════════════════════════════════════════ */
function initParticles(){
  const c=document.getElementById('bgc');
  const ctx=c.getContext('2d');
  let W=c.width=window.innerWidth,H=c.height=window.innerHeight;
  const pts=Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1}));
  window.addEventListener('resize',()=>{W=c.width=window.innerWidth;H=c.height=window.innerHeight});
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(100,120,255,0.5)';ctx.fill();
    });
    pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{
      const d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<120){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(100,120,255,${.3*(1-d/120)})`;ctx.lineWidth=.5;ctx.stroke()}
    }));
    requestAnimationFrame(draw);
  }
  draw();
}

function confetti(n=40){
  const cols=['#00ff88','#9b59ff','#00d4ff','#ffaa00','#ff4466','#fff'];
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.className='confetti-piece';
    d.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${cols[i%cols.length]};width:${Math.random()*10+6}px;height:${Math.random()*10+6}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${Math.random()*1.5+1}s;animation-delay:${Math.random()*.5}s`;
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),3000);
  }
}

/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */
let audioCtx=null;
function beep(freq=440,dur=0.1,vol=0.2,type='sine'){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator();const g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.frequency.value=freq;o.type=type;g.gain.value=vol;
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function soundCorrect(){beep(880,.1,.15);setTimeout(()=>beep(1100,.1,.1),80)}

function soundLevelUp(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.15,.2),i*100))}

function ringSVG(pct,size=44,stroke=4){
  const r=(size-stroke*2)/2,circ=2*Math.PI*r;
  const offset=circ-(pct/100)*circ;
  return `<svg class="ring" width="${size}" height="${size}"><circle class="ring-bg" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${stroke}"/><circle class="ring-fill" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${stroke}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="stroke:var(${DB[Object.keys(DB).find(k=>k)||'gans'].color}||--g)"/></svg>`;
}

function modRing(modId,size=44){
  const prog=S.moduleProgress[modId]||{};
  const pct=prog.bestPct||0;
  const m=DB[modId];
  const r=(size-4)/2,circ=2*Math.PI*r;
  const offset=circ-(pct/100)*circ;
  return `<svg class="ring" width="${size}" height="${size}"><circle class="ring-bg" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="4"/><circle class="ring-fill" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="4" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="stroke:var(${m.color})"/></svg>`;
}

function calcXP(){return 10+Math.min(S.streak,5)*2}

function answerQuiz(chosen){
  clearTimer();
  const q=S.questions[S.qi];
  const correct=chosen===q.ans;
  const btns=document.querySelectorAll('.option-btn');
  btns.forEach(b=>b.disabled=true);
  if(btns[chosen])btns[chosen].classList.add(correct?'correct':'wrong');
  if(!correct&&btns[q.ans])btns[q.ans].classList.add('reveal');
  if(correct){
    S.correct++;S.streak++;S.score+=calcXP();
    if(S.streak>S.bestStreak){S.bestStreak=S.streak}
    S.totalCorrect++;soundCorrect();
    showFeedback(true,`+${calcXP()} XP${S.streak>1?` 🔥×${S.streak}`:''}`)
    const lvlUp=addXP(calcXP());
    if(lvlUp)setTimeout(()=>showLevelUp(),1200);
  }else{
    S.streak=0;S.totalAnswered++;soundWrong();
    showFeedback(false,'Wrong!')
  }
  S.totalAnswered++;
  checkAchievements();
  saveState();
  setTimeout(()=>{S.qi++;renderQuiz()},1400);
}

function startTimer(sec,mode){
  const bar=document.getElementById('timer-bar');
  const txt=document.getElementById('timer-text');
  S.timerSec=sec;
  S.timer=setInterval(()=>{
    S.timerSec--;
    const pct=S.timerSec/S.timerMax*100;
    if(bar){
      bar.style.width=pct+'%';
      bar.className='timer-bar'+(pct<30?' danger':pct<50?' warn':'');
    }
    if(txt)txt.textContent=`⏱ ${S.timerSec}s`;
    if(S.timerSec<=0){
      clearTimer();
      if(mode==='quiz')timeoutQuiz();
      else if(mode==='blitz')timeoutBlitz();
    }
  },1000);
}

function timeoutQuiz(){
  const q=S.questions[S.qi];
  const btns=document.querySelectorAll('.option-btn');
  btns.forEach(b=>b.disabled=true);
  if(btns[q.ans])btns[q.ans].classList.add('reveal');
  S.streak=0;S.totalAnswered++;soundWrong();
  showFeedback(false,'⏰ Time Up!');
  setTimeout(()=>{S.qi++;renderQuiz()},1400);
}

  renderMatch();

function renderMatch(){
  const m=DB[S.mod];
  const total=S.matchAnswers.length;
  app.innerHTML=`
  <div class="top-nav">
    <button class="back-btn" onclick="go('mode')">← Modes</button>
    <div style="flex:1">${m.icon} Match Master</div>
    <div class="stat stat-g" style="padding:.3rem .6rem"><span class="stat-val">${S.matchedPairs}/${total}</span></div>
  </div>
  <div class="container fade-in">
    <div style="font-size:.85rem;color:var(--dim);margin-bottom:.8rem;text-align:center">Click a TERM on the left, then its DEFINITION on the right</div>
    <div class="match-grid">
      <div>
        <div class="match-col-label">📌 Terms</div>
        ${S.matchItems.left.map((item,i)=>matchItemHTML(item,i,'left')).join('')}
      </div>
      <div>
        <div class="match-col-label">📖 Definitions</div>
        ${S.matchItems.right.map((item,i)=>matchItemHTML(item,i,'right')).join('')}
      </div>
    </div>
    <div style="font-size:.8rem;color:var(--dim);text-align:center;margin-top:.8rem">Each correct match = 15 XP ✨</div>
  </div>`;
}

function matchItemHTML(item,i,side){
  let cls='match-item';
  if(item.matched)cls+=' matched-correct';
  else if(item.selected)cls+=' selected';
  const onclick=item.matched?'':` onclick="selectMatch(${i},'${side}')"`;
  return`<div class="${cls}" id="m${side}${i}"${onclick}>${item.text}</div>`;
}

function selectMatch(i,side){
  soundClick();
  if(side==='left'){
    S.matchItems.left.forEach((it,j)=>{if(!it.matched)it.selected=(j===i)});
    S.matchLeft=i;
  }else{
    S.matchItems.right.forEach((it,j)=>{if(!it.matched)it.selected=(j===i)});
    S.matchRight=i;
  }
  if(S.matchLeft!==-1&&S.matchRight!==-1){
    tryMatch(S.matchLeft,S.matchRight);
    return;
  }
  renderMatch();
}

function tryMatch(li,ri){
  const left=S.matchItems.left[li];
  const right=S.matchItems.right[ri];
  // check if they correspond
  const correctRight=S.matchAnswers.findIndex(p=>p.term===left.text&&p.def===right.text);
  if(correctRight!==-1){
    left.matched=true;right.matched=true;
    left.selected=false;right.selected=false;
    S.matchLeft=-1;S.matchRight=-1;
    S.matchedPairs++;S.correct++;S.totalCorrect++;S.totalAnswered++;
    soundCorrect();showFeedback(true,'+15 XP ✓');
    const lvlUp=addXP(15);S.score+=15;
    checkAchievements();saveState();
    if(S.matchedPairs>=S.matchAnswers.length){setTimeout(()=>endGame('match'),800)}
    else{renderMatch()}
    if(lvlUp)setTimeout(()=>showLevelUp(),1200);
  }else{
    left.selected=false;right.selected=false;
    S.matchLeft=-1;S.matchRight=-1;
    S.totalAnswered++;soundWrong();showFeedback(false,'Not a match!');
    renderMatch();
  }
}

    </div>
    <div class="question-box fade-in">
      <div class="question-num">💀 Boss Question ${S.qi+1} — ${q.type==='tf'?'True or False?':'Multiple Choice'}</div>
      <div class="question-text">${q.q}</div>
      ${q.type==='mcq'?`
      <div class="options" id="opts">
        ${q.opts.map((o,i)=>`<button class="option-btn" id="opt${i}" onclick="answerBoss(${i})" data-i="${i}">

      </div>`}
    </div>
    <div style="font-size:.8rem;color:var(--dim);text-align:center;margin-top:.5rem">🔥 Streak: ${S.streak} • Score: ${S.score}</div>

function answerBoss(chosen){
  const q=S.questions[S.qi];
  const correct=chosen===q.ans;
  const btns=document.querySelectorAll('.option-btn');
  btns.forEach(b=>b.disabled=true);
  if(btns[chosen])btns[chosen].classList.add(correct?'correct':'wrong');
  if(!correct&&btns[q.ans])btns[q.ans].classList.add('reveal');
  processBossAnswer(correct);
}
function answerBossTF(chosen){
  const q=S.questions[S.qi];
  const correct=chosen===q.ans;
  document.getElementById('btrue').disabled=true;
  document.getElementById('bfalse').disabled=true;
  document.getElementById(chosen?'btrue':'bfalse').classList.add(correct?'correct':'wrong');
  if(!correct){
    const exp=document.createElement('div');
    exp.style.cssText='background:rgba(255,68,102,.1);border:1px solid var(--r);border-radius:10px;padding:.6rem .9rem;font-size:.82rem;margin-top:.7rem;line-height:1.4;animation:fade-in .3s';
    exp.innerHTML=`<strong style="color:var(--r)">✗ ${q.ans?'TRUE':'FALSE'}</strong> — ${q.exp}`;
    document.querySelector('.container').appendChild(exp);
  }
  processBossAnswer(correct);
}

function processBossAnswer(correct){
  if(correct){
    S.correct++;S.streak++;S.totalCorrect++;
    if(S.streak>S.bestStreak)S.bestStreak=S.streak;
    const xp=12+Math.min(S.streak,5)*2;
    S.score+=xp;S.bossHP=Math.max(0,S.bossHP-5);
    soundCorrect();showFeedback(true,`+${xp} XP 💥`);
    const lvlUp=addXP(xp);if(lvlUp)setTimeout(()=>showLevelUp(),1200);
  }else{
    S.streak=0;S.lives--;soundWrong();
    beep(150,.3,.2,'sawtooth');
    showFeedback(false,`-1 ❤️ ${S.lives} left`);
  }
  S.totalAnswered++;checkAchievements();saveState();
  setTimeout(()=>{S.qi++;renderBoss()},1600);
}

/* ═══════════════════════════════════════════════
   END GAME & RESULTS
═══════════════════════════════════════════════ */
function endGame(mode){
  clearTimer();
  let total,correct,pct;
  if(mode==='match'){total=S.matchAnswers.length;correct=S.matchedPairs;pct=Math.round(correct/total*100)}
  else if(mode==='boss'){total=20;correct=S.correct;pct=Math.round(correct/total*100)}
  else{total=S.questions.length;correct=S.correct;pct=Math.round(correct/total*100)}

  // Update module progress
  if(S.mod){
    if(!S.moduleProgress[S.mod])S.moduleProgress[S.mod]={};
    if(pct>(S.moduleProgress[S.mod].bestPct||0)){S.moduleProgress[S.mod].bestPct=pct}
  }

  // Save to leaderboard
  saveScore(S.playerName,pct,mode,S.mod);
  if(pct>=90)confetti(60);else if(pct>=70)confetti(25);
  saveState();
  go('results');
}

function renderResults(){
  const mode=S.mode;const mod=S.mod;
  let total,correct,pct,modeName,modeEmoji;
  if(mode==='match'){total=S.matchAnswers?.length||6;correct=S.matchedPairs;pct=Math.round(correct/total*100)}
  else if(mode==='boss'){total=20;correct=S.correct;pct=Math.round(correct/total*100)}
  else{total=S.questions?.length||10;correct=S.correct;pct=Math.round(correct/total*100)}
  const grade=getGrade(pct);
  const modeNames={quiz:'🎯 Quiz Mode',blitz:'⚡ Speed Blitz',match:'🔗 Match Master',boss:'💀 Boss Battle'};
  const xpNeeded=xpForLevel(S.level);
  const xpPct=Math.min(100,Math.round(S.xp/xpNeeded*100));
  app.innerHTML=`
  <div class="container fade-in" style="padding-top:2rem">
    <div class="center mb-2">
      <div style="font-size:.85rem;color:var(--dim)">${modeNames[mode]||mode} ${mod?`— ${DB[mod]?.name||''}`:''}</div>
    </div>
    <div class="result-score" style="color:var(${grade.c})">${pct}%</div>
    <div class="result-grade" style="color:var(${grade.c})">${grade.t}</div>
    <div class="card mt-3">
      <div class="flex" style="justify-content:space-between;margin-bottom:.5rem">
        <span style="font-size:.85rem;color:var(--dim)">Score</span>
        <span style="font-weight:700">${correct}/${total}</span>
      </div>
      <div class="result-bar"><div class="result-bar-fill" style="width:${pct}%"></div></div>
      <div class="flex" style="justify-content:space-between;margin-top:.7rem">
        <div class="stat stat-g" style="padding:.4rem .7rem"><span style="font-size:.75rem">Correct</span><br><span class="stat-val">${correct}</span></div>
        <div class="stat stat-r" style="padding:.4rem .7rem"><span style="font-size:.75rem">Wrong</span><br><span class="stat-val">${total-correct}</span></div>
        <div class="stat stat-a" style="padding:.4rem .7rem"><span style="font-size:.75rem">XP Earned</span><br><span class="stat-val">+${S.sessionXP}</span></div>
        <div class="stat stat-b" style="padding:.4rem .7rem"><span style="font-size:.75rem">Best Streak</span><br><span class="stat-val">${S.bestStreak}🔥</span></div>
      </div>
    </div>
    <div class="xp-gain mt-2">+${S.sessionXP} XP</div>
    <div style="text-align:center;margin:.3rem 0 1rem">
      <div class="xp-bar-wrap" style="max-width:300px;margin:.3rem auto;height:12px"><div class="xp-bar-fill" style="width:${xpPct}%"></div></div>
      <div style="font-size:.78rem;color:var(--dim)">Level ${S.level} — ${S.xp}/${xpNeeded} XP</div>
    </div>
    ${S.sessionAchs.length?`
    <div style="font-size:.85rem;color:var(--a);font-weight:700;margin-bottom:.5rem">🏆 Achievements Unlocked!</div>
    <div class="flex-col" style="gap:.4rem;margin-bottom:1rem">
      ${S.sessionAchs.map(a=>`<div class="achievement"><span class="ach-icon">${a.icon}</span><div><div class="ach-title">${a.title}</div><div class="ach-desc">${a.desc}</div></div></div>`).join('')}
    </div>`:''}
    ${pct<70&&mod?`<div class="card mb-2" style="border-color:rgba(255,170,0,.3);background:rgba(255,170,0,.05)"><span style="font-size:.85rem">💡 <strong>Tip:</strong> Score 70%+ to master this module. Review the slides and try again!</span></div>`:''}
    <div class="flex-col" style="gap:.6rem;max-width:360px;margin:0 auto">
      <button class="btn btn-primary btn-full" onclick="replayMode()">🔄 Play Again</button>
      ${mod?`<button class="btn btn-secondary btn-full" onclick="go('mode')">📋 Other Modes</button>`:''}
      <button class="btn btn-secondary btn-full" onclick="go('modules')">🗂️ All Modules</button>
      <button class="btn btn-secondary btn-full" onclick="go('home')">🏠 Home</button>
    </div>
  </div>`;
}

function replayMode(){
  const mode=S.mode;
  if(mode==='boss')startBoss();
  else if(S.mod)startMode(mode);
}

/* ═══════════════════════════════════════════════
   LEADERBOARD
═══════════════════════════════════════════════ */
function saveScore(name,pct,mode,mod){
  try{
    let lb=JSON.parse(localStorage.getItem('ainexus_lb')||'[]');
    lb.push({name,pct,mode,mod,date:new Date().toLocaleDateString()});
    lb.sort((a,b)=>b.pct-a.pct);
    lb=lb.slice(0,20);
    localStorage.setItem('ainexus_lb',JSON.stringify(lb));
  }catch(e){}
}

function renderLeaderboard(){
  let lb=[];
  try{lb=JSON.parse(localStorage.getItem('ainexus_lb')||'[]')}catch(e){}
  const rankColors=['gold','silver','bronze'];
  const modeNames={quiz:'Quiz',blitz:'Blitz',match:'Match',boss:'Boss'};
  app.innerHTML=`
  <div class="top-nav">
    <button class="back-btn" onclick="go('home')">← Home</button>
    <div style="flex:1"><h2>🏆 Leaderboard</h2></div>
  </div>
  <div class="container fade-in">
    ${lb.length===0?`<div class="card center" style="padding:2rem"><div style="font-size:2rem;margin-bottom:.5rem">📋</div><div style="color:var(--dim)">No scores yet! Complete some quizzes to appear here.</div></div>`:
    `<div class="flex-col" style="gap:.5rem">
      ${lb.map((entry,i)=>`
        <div class="lb-row${entry.name===S.playerName?' card-glow-g':''}">
          <div class="lb-rank ${rankColors[i]||''}">${i<3?['🥇','🥈','🥉'][i]:i+1}</div>
          <div class="lb-name">${entry.name} <span style="font-size:.72rem;color:var(--dim)">${entry.date}</span></div>
          <span style="font-size:.75rem;color:var(--dim);margin-right:.3rem">${entry.mod?`${DB[entry.mod]?.icon||''}`:''} ${modeNames[entry.mode]||''}</span>
          <div class="lb-score">${entry.pct}%</div>
        </div>`).join('')}
    </div>`}
    <div class="mt-3 center">
      <button class="btn btn-secondary btn-sm" onclick="if(confirm('Clear leaderboard?')){localStorage.removeItem('ainexus_lb');renderLeaderboard()}">🗑️ Clear Scores</button>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════
   ACHIEVEMENTS
═══════════════════════════════════════════════ */
const ACHIEVEMENTS=[
  {id:'first_blood',icon:'🎯',title:'First Blood',desc:'Answer your first question correctly',cond:()=>S.totalCorrect>=1},
  {id:'streak5',icon:'🔥',title:'On Fire!',desc:'Get a 5-question streak',cond:()=>S.bestStreak>=5},
  {id:'streak10',icon:'💥',title:'Unstoppable!',desc:'Get a 10-question streak',cond:()=>S.bestStreak>=10},
  {id:'perfect_quiz',icon:'⭐',title:'Flawless Quiz',desc:'Score 100% on a quiz',cond:()=>S.correct>0&&S.qi>0&&S.correct===S.qi},
  {id:'century',icon:'💯',title:'Century Club',desc:'Answer 100 questions total',cond:()=>S.totalAnswered>=100},
  {id:'level5',icon:'🚀',title:'Rising Star',desc:'Reach Level 5',cond:()=>S.level>=5},
  {id:'all_modules',icon:'🌐',title:'Polymath',desc:'Score 70%+ on all 6 modules',cond:()=>MODULE_ORDER.every(m=>(S.moduleProgress[m]?.bestPct||0)>=70)},
  {id:'boss_slayer',icon:'👑',title:'Boss Slayer',desc:'Complete Boss Battle with all lives intact',cond:()=>S.mode==='boss'&&S.lives===3&&S.qi>=20},
  {id:'speed_demon',icon:'⚡',title:'Speed Demon',desc:'Complete Speed Blitz with 100% accuracy',cond:()=>S.mode==='blitz'&&S.correct===S.questions?.length&&S.qi>=S.questions?.length},
  {id:'match_master',icon:'🔗',title:'Match Master',desc:'Complete a Match round without any errors',cond:()=>S.mode==='match'&&S.totalAnswered===S.matchedPairs&&S.matchedPairs>0},
];

function checkAchievements(){
  ACHIEVEMENTS.forEach(a=>{
    if(!S.achievements.includes(a.id)&&a.cond()){
      S.achievements.push(a.id);
      if(!S.sessionAchs.find(x=>x.id===a.id))S.sessionAchs.push(a);
    }
  });
}

/* ═══════════════════════════════════════════════
   FEEDBACK OVERLAY
═══════════════════════════════════════════════ */
function showFeedback(correct,msg){
  document.querySelectorAll('.feedback').forEach(e=>e.remove());
  const div=document.createElement('div');div.className='feedback';
  div.innerHTML=`<div class="feedback-bubble ${correct?'correct':'wrong'}">${msg}</div>`;
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),1300);
}

/* ═══════════════════════════════════════════════
   LEVEL UP OVERLAY
═══════════════════════════════════════════════ */
function showLevelUp(){
  soundLevelUp();confetti(30);
  const div=document.createElement('div');div.className='levelup-overlay';
  div.innerHTML=`
    <div class="levelup-box">
      <div style="font-size:3rem;margin-bottom:.5rem">🎉</div>
      <div style="font-size:.85rem;color:var(--a);text-transform:uppercase;letter-spacing:.15em;font-weight:700">Level Up!</div>
      <div style="font-size:3.5rem;font-weight:900;color:var(--a);line-height:1">LVL ${S.level}</div>
      <div style="color:var(--dim);font-size:.85rem;margin-top:.3rem">You're getting stronger! 💪</div>
      <button class="btn btn-secondary btn-sm mt-2" onclick="this.closest('.levelup-overlay').remove()">Continue ▶</button>
    </div>`;
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),3000);
}

/* ═══════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════ */
function shuffle(arr){return arr.sort(()=>Math.random()-.5)}

function go(screen){S.screen=screen;render()}

function changeName(){
  const name=prompt('Enter your name (max 16 chars):',S.playerName);
  if(name&&name.trim()){S.playerName=name.trim().slice(0,16);saveState();render()}
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
loadState();
initParticles();
render();
</script>
</body>
</html>
